<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard - GDSR Hub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <a class="back-button" href="index.html">← Back to Hub</a>

  <h1>Leaderboard</h1>

  <p class="subtitle">
    Top players ranked by accepted completions.
  </p>

  <main class="leaderboard-page">

    <div class="leaderboard-controls">
      <input id="leaderboard-search" placeholder="Search username or nickname">

      <select id="leaderboard-sort">
        <option value="points">Sort by Points</option>
        <option value="completions">Sort by Total Completions</option>
        <option value="likes">Sort by Likes</option>
        <option value="followers">Sort by Followers</option>
      </select>

      <select id="tag-filter">
        <option value="">All Tags</option>
      </select>
    </div>

    <div id="leaderboard-list" class="leaderboard-list"></div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script src="js/leaderboard.js"></script>

</body>
</html>
