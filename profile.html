<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - GDSR Hub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <a class="back-button" href="index.html">← Back to Hub</a>

<h1>Your Profile</h1>

<p class="subtitle">
  Edit your public GDSR profile info.
</p>

<main class="form-page">
  <div class="form-box">

    <label for="nickname">Nickname</label>
    <input id="nickname" placeholder="Your nickname">

    <label for="country">Country</label>
    <input id="country" placeholder="Country">

    <label for="pronouns">Pronouns</label>
    <input id="pronouns" placeholder="Pronouns">

    <label for="bio">Bio</label>
    <textarea id="bio" placeholder="About you"></textarea>

    <button class="submit-button" onclick="saveProfile()">
      Save Profile
    </button>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
