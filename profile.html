<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Profile - GDSR Hub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <a class="back-button" href="index.html">← Back to Hub</a>

  <h1>Your Profile</h1>

  <p class="subtitle">
    View your profile and submitted completions.
  </p>

  <main class="profile-page">

    <div class="profile-top">
      <img id="profile-avatar" class="profile-avatar">
    </div>

    <section class="profile-display-card">
      <div class="profile-header">
        <h2 id="profile-name">Loading...</h2>

        <a class="edit-profile-button" href="edit-profile.html">
          Edit Profile
        </a>
      </div>

      <div class="profile-info-grid">
        <p><strong>Discord Username:</strong> <span id="discord-name">Loading...</span></p>
        <p><strong>Displayed Nickname:</strong> <span id="nickname">Not set</span></p>
        <p><strong>Pronouns:</strong> <span id="pronouns">Not set</span></p>
        <p><strong>Country:</strong> <span id="country">Not set</span></p>
        <p><strong>Bio:</strong> <span id="bio">Not set</span></p>
      </div>
    </section>

    <section class="completion-section">
      <h2>Approved Completions</h2>
      <div id="approved-completions" class="completion-list"></div>
    </section>

    <section class="completion-section">
      <h2>Pending Completions</h2>
      <div id="pending-completions" class="completion-list"></div>
    </section>

    <section class="completion-section">
      <h2>Denied Completions</h2>
      <div id="denied-completions" class="completion-list"></div>
    </section>

  </main>

  <div id="completion-modal" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close" onclick="closeCompletionModal()">×</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>

</body>
</html>
